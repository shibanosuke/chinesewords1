<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中国語 単語カード（音声＆ランダム機能付き）</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --secondary-color: #f5a623;
            --audio-color: #e74c3c;
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-color: #333333;
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 10px;
            text-align: center;
        }

        .controls {
            margin-bottom: 15px;
            width: 100%;
            max-width: 500px;
            display: flex;
            gap: 10px;
        }

        select {
            flex: 2;
            padding: 12px;
            font-size: 1rem;
            border-radius: 8px;
            border: 1px solid #ccc;
            background-color: white;
            cursor: pointer;
        }

        /* ランダム切り替えボタン */
        .btn-mode {
            flex: 1;
            padding: 12px;
            font-size: 0.9rem;
            font-weight: bold;
            border: 1px solid #ccc;
            border-radius: 8px;
            background-color: #fff;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-mode.active {
            background-color: #34495e;
            color: white;
            border-color: #34495e;
        }

        .progress {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 10px;
        }

        /* 単語カード本体 */
        .card {
            background-color: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
            padding: 30px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 280px;
            justify-content: center;
            margin-bottom: 20px;
            position: relative;
        }

        .word-tag {
            position: absolute;
            top: 15px;
            left: 15px;
            background: #e1f0ff;
            color: var(--primary-color);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .simplified {
            font-size: 3.5rem;
            font-weight: bold;
            margin-bottom: 15px;
            color: #111;
            text-align: center;
            word-break: break-all;
        }

        .display-field {
            font-size: 1.3rem;
            min-height: 1.8rem;
            margin: 8px 0;
            text-align: center;
            font-weight: 500;
        }

        .pinyin-field { color: #2c3e50; }
        .meaning-field { color: #27ae60; }
        
        .hidden-text {
            visibility: hidden;
        }

        /* 押しやすい操作ボタン群 */
        .toggle-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            width: 100%;
            max-width: 500px;
            margin-bottom: 12px;
        }

        .btn-toggle {
            background-color: #e0e0e0;
            color: #333;
            border: none;
            padding: 16px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .btn-toggle.active {
            background-color: var(--primary-color);
            color: white;
        }

        /* 音声再生用のでかいボタン */
        .audio-container {
            width: 100%;
            max-width: 500px;
            margin-bottom: 15px;
        }

        .btn-audio {
            width: 100%;
            background-color: var(--audio-color);
            color: white;
            border: none;
            padding: 16px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .nav-buttons {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 12px;
            width: 100%;
            max-width: 500px;
        }

        .btn-nav {
            border: none;
            padding: 18px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background 0.2s;
        }

        .btn-prev {
            background-color: #95a5a6;
            color: white;
        }

        .btn-next {
            background-color: var(--secondary-color);
            color: white;
        }

        .btn-nav:active, .btn-toggle:active, .btn-audio:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <h1>中国語 単語カード</h1>

    <div class="controls">
        <!-- 課の切り替え -->
        <select id="sectionSelect" onchange="changeSection()">
            <option value="all">すべて表示 (71語)</option>
            <option value="発音編">発音編 (40語)</option>
            <option value="第一課">第一課 (20語)</option>
            <option value="第二課">第二課 (9語)</option>
            <option value="第三課">第三課 (7語)</option>
            <option value="第四課">第四課 (17語)</option>
        </select>
        <!-- ランダムボタン -->
        <button id="btnShuffle" class="btn-mode" onclick="toggleShuffle()">並び順: 教科書</button>
    </div>

    <div class="progress" id="progressText">1 / 71</div>

    <!-- カード本体 -->
    <div class="card">
        <div class="word-tag" id="wordTag">発音編</div>
        <div class="simplified" id="wordSimplified">干杯</div>
        <div class="display-field pinyin-field" id="wordPinyinField">
            <span id="wordPinyin" class="hidden-text">gānbēi</span>
        </div>
        <div class="display-field meaning-field" id="wordMeaningField">
            <span id="wordMeaning" class="hidden-text">乾杯する</span>
        </div>
    </div>

    <!-- 音声再生ボタン -->
    <div class="audio-container">
        <button class="btn-audio" onclick="speakCurrentWord()">
            🔊 発音を聞く (音声再生)
        </button>
    </div>

    <!-- 切り替えボタン -->
    <div class="toggle-buttons">
        <button id="btnPinyin" class="btn-toggle" onclick="toggleDisplay('pinyin')">ピンイン 表示</button>
        <button id="btnMeaning" class="btn-toggle" onclick="toggleDisplay('meaning')">意味 表示</button>
    </div>

    <!-- ナビゲーションボタン -->
    <div class="nav-buttons">
        <button class="btn-nav btn-prev" onclick="prevWord()">戻る</button>
        <button class="btn-nav btn-next" onclick="nextWord()">次の単語に進む</button>
    </div>

            { section: "第一課", simplified: "请多关照", pinyin: "qǐng duō guānzhào", meaning: "よろしくお願いします" },
            { section: "第一課", simplified: "不客气", pinyin: "bú kèqi", meaning: "どういたしまして" },

            // 第二課
            { section: "第二課", simplified: "留学生", pinyin: "liúxuéshēng", meaning: "留学生" },
            { section: "第二課", simplified: "宿舍", pinyin: "sùshè", meaning: "宿舎、寮" },

        let currentList = [...allVocabulary];
        let currentIndex = 0;
        let isPinyinVisible = false;
        let isMeaningVisible = false;
        let isShuffleMode = false;

        // 音声再生関数 (Web Speech API)
        function speakCurrentWord() {
            if (currentList.length === 0) return;
            const text = currentList[currentIndex].simplified;
            
            // 以前の発音をキャンセル
            window.speechSynthesis.cancel();
            
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'zh-CN'; // 中国語（大陸）に設定
            utterance.rate = 0.8;    // 少しゆっくりめで聞き取りやすく
            
            window.speechSynthesis.speak(utterance);
        }

        // 状態を画面に反映
        function updateCard() {
            if (currentList.length === 0) {
                document.getElementById("wordSimplified").innerText = "単語がありません";
                document.getElementById("wordPinyin").innerText = "";
                document.getElementById("wordMeaning").innerText = "";
                document.getElementById("progressText").innerText = "0 / 0";
                return;
            }

            const currentWord = currentList[currentIndex];
            document.getElementById("wordTag").innerText = currentWord.section;
            document.getElementById("wordSimplified").innerText = currentWord.simplified;
            document.getElementById("wordPinyin").innerText = currentWord.pinyin;
            document.getElementById("wordMeaning").innerText = currentWord.meaning;
            
            document.getElementById("progressText").innerText = `${currentIndex + 1} / ${currentList.length}`;

            // 表示状態の適用
            const pinyinEl = document.getElementById("wordPinyin");
            const btnPinyin = document.getElementById("btnPinyin");
            if (isPinyinVisible) {
                pinyinEl.classList.remove("hidden-text");
                btnPinyin.classList.add("active");
            } else {
                pinyinEl.classList.add("hidden-text");
                btnPinyin.classList.remove("active");
            }

            const meaningEl = document.getElementById("wordMeaning");
            const btnMeaning = document.getElementById("btnMeaning");
            if (isMeaningVisible) {
                meaningEl.classList.remove("hidden-text");
                btnMeaning.classList.add("active");
            } else {
                meaningEl.classList.add("hidden-text");
                btnMeaning.classList.remove("active");
            }
        }

        // 表示・非表示のトグル
        function toggleDisplay(type) {
            if (type === 'pinyin') {
                isPinyinVisible = !isPinyinVisible;
            } else if (type === 'meaning') {
                isMeaningVisible = !isMeaningVisible;
            }
            updateCard();
        }

        function resetVisibility() {
            isPinyinVisible = false;
            isMeaningVisible = false;
        }

        function nextWord() {
            if (currentList.length === 0) return;
            resetVisibility();
            currentIndex = (currentIndex + 1) % currentList.length;
            updateCard();
        }

        function prevWord() {
            if (currentList.length === 0) return;
            resetVisibility();
            currentIndex = (currentIndex - 1 + currentList.length) % currentList.length;
            updateCard();
        }

        // 課のフィルター切り替え
        function changeSection() {
            applyFilterAndOrder();
        }

        // ランダムモードのトグル

            isShuffleMode = !isShuffleMode;
            const btn = document.getElementById("btnShuffle");
            if (isShuffleMode) {
                btn.innerText = "並び順: ランダム";
                btn.classList.add("active");
            } else {
                btn.innerText = "並び順: 教科書";
                btn.classList.remove("active");
            }
            applyFilterAndOrder();
        }

        // フィルターと並び順を同時に適用するロジック
        function applyFilterAndOrder() {
            const selected = document.getElementById("sectionSelect").value;
            
            // 1. まずフィルター
            if (selected === "all") {
                currentList = [...allVocabulary];
            } else {
                currentList = allVocabulary.filter(word => word.section === selected);
            }

            // 2. 次に並び替え（ランダムならシャッフル）
            if (isShuffleMode) {
                for (let i = currentList.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [currentList[i], currentList[j]] = [currentList[j], currentList[i]];
                }
            }

            currentIndex = 0;
            resetVisibility();
            updateCard();
        }

        // 初期起動
        updateCard();
    </script>
</body>
</html>
